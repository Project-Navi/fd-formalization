repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
  - repo: local
    hooks:
      - id: check-copyright
        name: Mathlib copyright header (Lean files)
        entry: scripts/check-copyright.sh
        language: script
        files: \.lean$
        exclude: \.lake/
